ACCELERATOR: "gpu"
PRECISION: "bf16-mixed"
MODE: "full"

BACKBONE_OUT_DIMS:
  iresnet50: 512
  resnet50: 2048
  vit_base_patch16_224: 768
  vit_small_patch16_224: 384
  vit_tiny_patch16_224: 192
  deit_tiny_patch16_224: 192
  deit_small_patch16_224: 384

EXTRACT_FEATURE:
  MAX_SCORE: 63
  NUM_WORKERS: 16
  BATCH_SIZE: 2
  MODEL_NAME: "deit_tiny_patch16_224"
  TIMM_PRETRAINED: False
  MODEL_WEIGHT_PATH: null
  CHUNK_SIZE: 64
  LEARNING_RATE: 1e-5
  WEIGHT_DECAY: 5e-4
  USE_GRAD_CHECKPOINTING: True
  FINETUNE_LAST_N_BLOCKS: 2
  CLEAR_CUDA_CACHE: False

PROCESS_TEMPORAL:
  HIDDEN_DIM: 192
  EXPERT_DIM: 192
  CONTRASTIVE_DIM: 96
  MAX_SEQ_LEN: 3000
  CLASS_STEP: 2
  SAMPLE_STEP: 10
  NUM_SHARED_GEN: 1
  NUM_SHARED_CON: 1
  NUM_SPECIFIC: 1
  TEMPERATURE: 0.10
  BDI_SIGMA: 5.0
  CCC_LOSS_WEIGHT: 0.05
  LDS_SIGMA: 2.0
  LDS_SEVERITY_ALPHA: 0.2
  PRED_MEAN_LOSS_WEIGHT: 0.02
  PRED_STD_LOSS_WEIGHT: 0.05
  CLS_LOSS_WEIGHT: 1.0
  CON_LOSS_WEIGHT: 0.0
  DISABLE_MULTIVIEW_CONTRASTIVE: True
  USE_PCGRAD: False
  USE_UNCERTAINTY_WEIGHT: False
  DROPOUT: 0.35
  ADVERSARIAL_MASK: 999
  MASK_UPDATE_INTERVAL: 10
  BASE_MASK_PROB: 0.05
  MAX_MASK_PROB: 0.20
  KERNEL_SIZE: 5
  SIGMA: 1.0
  MOVING_AVG_KERNELS: [3, 7, 15]
  GATE_TEMPERATURE: 4.0
  GATE_ENTROPY_WEIGHT: 0.02
  GATE_BALANCE_WEIGHT: 0.01
  MAX_EPOCHS: 80
  FREEZE_EPOCHS: 5
  WARMUP_EPOCHS: 15
  LEARNING_RATE: 1e-4
  WEIGHT_DECAY: 5e-4

DATASET:
  RETURN_MULTI_VIEW_TRAIN: True
  INPUT_VARIANT: "rgb"

MODEL:
  NAME: "legacy_full_model"
  AUXILIARY_TASKS:
    ORDINAL_CLASSIFICATION: True
    CONTRASTIVE: False
  ENABLE_CGC: False
  ENABLE_ADAPTIVE_MASK: False
  ENABLE_PCGRAD: False
  ENABLE_UNCERTAINTY_WEIGHTING: False

LOSSES:
  REGRESSION: "mse"
  ORDINAL_WEIGHT: 1.0
  CCC_WEIGHT: 0.0
  LDS_WEIGHTING: False
  DIST_WEIGHT: 0.0

VISUALIZATION:
  ENABLE: True
  REGRESSION_INTERVAL: 5
  EMBEDDING_INTERVAL: 10
  GATING_INTERVAL: 10
