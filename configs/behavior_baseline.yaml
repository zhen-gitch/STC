MODE: "behavior_baseline"
ACCELERATOR: "gpu"
DEVICES: 1
STRATEGY: "auto"
PRECISION: "bf16-mixed"

MODEL:
  NAME: "openface_behavior_baseline"
  AUXILIARY_TASKS:
    ORDINAL_CLASSIFICATION: False
    CONTRASTIVE: False
  ENABLE_CGC: False
  ENABLE_ADAPTIVE_MASK: False
  ENABLE_PCGRAD: False
  ENABLE_UNCERTAINTY_WEIGHTING: False

DATASET:
  RETURN_MULTI_VIEW_TRAIN: False
  OPENFACE_ROOT: null
  ALLOW_MISSING_OPENFACE: False

BEHAVIOR_FEATURES:
  FEATURE_SET: "custom"
  INCLUDE_QUALITY: True
  INCLUDE_POSE: True
  INCLUDE_GAZE: True
  INCLUDE_AU: True
  INCLUDE_LANDMARKS: True
  INCLUDE_DELTA: True
  INCLUDE_ACCELERATION: False

BEHAVIOR_MODEL:
  INPUT_DIM: 0
  HIDDEN_DIM: 128
  NUM_LAYERS: 1
  BIDIRECTIONAL: True
  DROPOUT: 0.20

LOSSES:
  REGRESSION: "mse"
  ORDINAL_WEIGHT: 0.0
  CCC_WEIGHT: 0.0
  LDS_WEIGHTING: False
  DIST_WEIGHT: 0.0

VISUALIZATION:
  ENABLE: False
